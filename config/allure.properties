# Allure Configuration

# ==================== Allure Results ====================
allure.results.directory=reports/allure

# ==================== Allure Report ====================
allure.report.directory=reports/allure-report

# ==================== Categories ====================
# Predefined categories for test results
# Categories are defined in categories.json in the allure results directory

# ==================== Links ====================
# Pattern for issue tracker links
allure.link.issue.pattern=https://example.com/issues/{}
allure.link.tms.pattern=https://example.com/testcases/{}

# ==================== Labels ====================
# Default labels for tests
allure.labels.epic=Default Epic
allure.labels.feature=Default Feature
allure.labels.story=Default Story

# ==================== Environment ====================
# Environment information file (optional)
# Create allure.properties in the allure results directory
# Example:
# environment=Production
# browser=Chrome
# version=1.0.0
