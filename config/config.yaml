# ==================== Application Config ====================
app:
  name: "Web Automation Test Framework"
  version: "1.0.0"
  environment: ${APP_ENV:test}  # dev, test, staging, prod

# ==================== URL Configuration ====================
urls:
  base: ${APP_BASE_URL:https://example.com}
  login: "/login"
  dashboard: "/dashboard"
  user_management: "/users"

# ==================== Browser Config ====================
browser:
  type: chromium  # chromium, firefox, webkit
  headless: ${BROWSER_HEADLESS:true}
  slow_mo: ${BROWSER_SLOW_MO:0}
  channel: ${BROWSER_CHANNEL:chrome}
  viewport:
    width: 1920
    height: 1080
  timeout:
    default: 30000
    navigation: 60000
    action: 10000

# ==================== Test Config ====================
test:
  parallel:
    enabled: true
    workers: auto  # auto or specific number
  rerun:
    enabled: true
    max_retries: 2
  retry:
    flaky:
      enabled: true
      max_attempts: 3
  data:
    driven: true
    source: "fixtures"  # fixtures, excel, csv, json

# ==================== Screenshot & Video ====================
screenshot:
  on_failure: true
  on_success: false
  full_page: true

video:
  enabled: true
  size:
    width: 1920
    height: 1080
  retain_on_failure: true

# ==================== Reporting ====================
reporting:
  html:
    enabled: true
    output: "reports/html"
  allure:
    enabled: true
    output: "reports/allure"
  junit:
    enabled: true
    output: "reports/junit"

# ==================== Logging ====================
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  output:
    console: true
    file: true
    path: "logs/auto"
    rotation: "100 MB"
    retention: "7 days"

# ==================== Database (Optional) ====================
database:
  enabled: false
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:3306}
  name: ${DB_NAME:testdb}
  user: ${DB_USER:root}
  password: ${DB_PASSWORD:}
  charset: utf8mb4

# ==================== API (Optional) ====================
api:
  enabled: false
  base_url: ${API_BASE_URL:}
  key: ${API_KEY:}
  token: ${API_TOKEN:}
  timeout: 30000

# ==================== Notification ====================
notification:
  enabled: false
  dingtalk:
    enabled: false
    webhook: ${DINGTALK_WEBHOOK:}
    secret: ${DINGTALK_SECRET:}
  email:
    enabled: false
    smtp_host: ${SMTP_HOST:}
    smtp_port: ${SMTP_PORT:587}
    smtp_user: ${SMTP_USER:}
    smtp_password: ${SMTP_PASSWORD:}
    recipients: []

# ==================== Jenkins ====================
jenkins:
  enabled: false
  url: ${JENKINS_URL:}
  user: ${JENKINS_USER:}
  api_token: ${JENKINS_API_TOKEN:}
