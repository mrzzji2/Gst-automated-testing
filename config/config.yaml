base_url: "https://doc-online-test.gstyun.cn/webClinic/index.html"
login_path: "/login"
headless: false

selectors:
  username: "input[placeholder*='手机号']"
  password: "input[placeholder*='验证码']"
  login_btn: "button:has-text('登录')"
  doctor_radio: "radio"
  confirm_btn: "button:has-text('确认'), button:has-text('确认切换')"

timeout:
  default: 30000
  navigation: 30000

reports:
  html_dir: "reports/html"
  allure_dir: "reports/allure"
  screenshots_dir: "screenshots"
  auth_state: "reports/.auth/state.json"

cleanup:
  days: 3