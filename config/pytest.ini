[pytest]
# Pytest Configuration File

# ==================== Test Discovery ====================
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# ==================== Markers ====================
markers =
    smoke: Quick smoke tests
    regression: Full regression tests
    sanity: Sanity tests
    api: API tests
    ui: UI tests
    slow: Slow running tests
    flaky: Tests that may occasionally fail
    skip: Skip these tests
    critical: Critical business flows

# ==================== Output ====================
addopts =
    # HTML Report
    --html=reports/html/report.html
    --self-contained-html

    # Allure Report
    --alluredir=reports/allure

    # JUnit XML
    --junitxml=reports/junit/results.xml

    # Verbose output
    -v

    # Show local variables in tracebacks
    --showlocals

    # Show summary of all test outcomes
    -ra

    # Strict markers (warn on unmarked tests)
    --strict-markers

    # Base URL (can be overridden by command line)
    --base-url=https://test.example.com

    # Log CLI
    --log-cli-level=INFO

    # Capture logging output
    --log-cli-format="%(asctime)s [%(levelname)s] %(message)s"
    --log-cli-date-format="%Y-%m-%d %H:%M:%S"

    # Timeout
    --timeout=300

    # Rerun failures
    --reruns=2

    # Parallel execution (if pytest-xdist is available)
    -n auto

    # Randomize test order (optional)
    # --randomly-seed=0

# ==================== Minimum Version ====================
minversion = 8.0

# ==================== Filter Warnings ====================
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# ==================== Coverage (Optional) ====================
# Uncomment if using pytest-cov
# addopts =
#     --cov=pages
#     --cov=utils
#     --cov-report=html
#     --cov-report=term-missing

# ==================== Logging ====================
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ==================== Timeout ====================
timeout = 300
timeout_method = thread

# ==================== Rerun ====================
reruns = 2
reruns_delay = 1
