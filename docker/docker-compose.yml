# Docker Compose 配置
# 用于本地开发和测试

version: '3.8'

services:
  # 主测试服务
  web-automation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: web-automation-tests
    volumes:
      # 挂载报告目录
      - ../reports:/app/reports
      - ../logs:/app/logs
      # 挂载配置文件（可选，用于本地覆盖）
      - ../.env:/app/.env:ro
      - ../config:/app/config:ro
    environment:
      # 测试环境配置
      - APP_ENV=test
      - APP_BASE_URL=${APP_BASE_URL:-https://test.example.com}
      - BROWSER_TYPE=chromium
      - BROWSER_HEADLESS=true
      # 日志配置
      - LOG_LEVEL=INFO
    command: >
      sh -c "
        echo 'Starting tests...' &&
        pytest tests/ -v --browser=chromium --headless=true
        --html=reports/html/report.html --self-contained-html
        --alluredir=reports/allure --junitxml=reports/junit/results.xml
      "
    networks:
      - test-network

  # Allure 报告服务（可选）
  allure-report:
    image: felicianotech/docker-allure:latest
    container_name: allure-report
    volumes:
      - ../reports/allure:/app/allure-results
      - ../reports/allure-report:/app/allure-report
    ports:
      - "5050:5050"
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=5
      - KEEP_HISTORY=1
    command: allure generate --clean /app/allure-results -o /app/allure-report
    networks:
      - test-network
    profiles:
      - report

  # Jenkins Agent（可选，用于 Jenkins 集成）
  jenkins-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: jenkins-agent
    volumes:
      - ../reports:/app/reports
      - ../logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JENKINS_AGENT_NAME=web-automation-agent
    command: >
      sh -c "
        while true; do
          echo 'Jenkins agent ready...'
          sleep 3600
        done
      "
    networks:
      - test-network
    profiles:
      - jenkins

networks:
  test-network:
    driver: bridge

volumes:
  reports:
  logs:
